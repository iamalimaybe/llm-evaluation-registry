spring.application.name=llm-evaluation-registry

spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${POSTGRES_PORT:5433}/${POSTGRES_DB:llm_eval_registry}
spring.datasource.username=${POSTGRES_USER:llm_eval_user}
spring.datasource.password=${POSTGRES_PASSWORD:llm_eval_password}

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true

spring.liquibase.change-log=classpath:db/db.changelog-master.xml

server.port=8080

ollama.base-url=${OLLAMA_BASE_URL:http://localhost:11434}