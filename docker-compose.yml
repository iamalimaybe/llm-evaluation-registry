services:
  postgres:
    image: postgres:16-alpine
    container_name: llm-evaluation-registry-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - llm_eval_registry_data:/var/lib/postgresql/data

volumes:
  llm_eval_registry_data: